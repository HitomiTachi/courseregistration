<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
		th:replace="~{layout/main :: siteLayout ('Register', 'none', ~{::content})}">
<body>
<div th:fragment="content">
	<div class="container py-5">
		<div class="row justify-content-center">
			<div class="col-12 col-md-8 col-lg-5">
				<h1 class="h4 mb-4">Create account</h1>
				<div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger" role="alert">
					<span th:each="e : ${#fields.globalErrors()}" th:text="${e}">Error</span>
				</div>
				<form th:action="@{/register}" th:object="${registerForm}" method="post" class="card card-body shadow-sm" novalidate>
					<div class="mb-3">
						<label class="form-label" for="username">Username</label>
						<input class="form-control" id="username" th:field="*{username}" type="text" autocomplete="username" required/>
						<div class="invalid-feedback d-block" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
					</div>
					<div class="mb-3">
						<label class="form-label" for="password">Password</label>
						<input class="form-control" id="password" th:field="*{password}" type="password" autocomplete="new-password" required/>
						<div class="invalid-feedback d-block" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
					</div>
					<div class="mb-3">
						<label class="form-label" for="email">Email</label>
						<input class="form-control" id="email" th:field="*{email}" type="email" autocomplete="email" required/>
						<div class="invalid-feedback d-block" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
					</div>
					<button class="btn btn-primary w-100" type="submit">Register</button>
				</form>
				<p class="mt-3 text-center small"><a th:href="@{/login}">Already have an account?</a></p>
			</div>
		</div>
	</div>
</div>
</body>
</html>
