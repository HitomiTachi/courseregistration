<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
		th:replace="~{layout/main :: siteLayout ('My courses', 'my', ~{::content})}">
<body>
<div th:fragment="content">
	<main class="container py-4 py-md-5">
		<h1 class="h3 mb-4">My courses</h1>
		<div th:if="${enrollments.isEmpty()}" class="alert alert-secondary">You have not enrolled in any course yet. Browse <a th:href="@{/courses}">available courses</a>.</div>
		<div class="table-responsive shadow-sm rounded border bg-white" th:if="${!enrollments.isEmpty()}">
			<table class="table table-striped align-middle mb-0">
				<thead class="table-light">
				<tr>
					<th scope="col">Course</th>
					<th scope="col">Lecturer</th>
					<th scope="col">Credits</th>
					<th scope="col">Category</th>
					<th scope="col">Enrolled on</th>
				</tr>
				</thead>
				<tbody>
				<tr th:each="row : ${enrollments}">
					<td th:text="${row.course.name}">Name</td>
					<td th:text="${row.course.lecturer}">Lecturer</td>
					<td th:text="${row.course.credits}">3</td>
					<td>
						<span th:if="${row.course.category != null}" th:text="${row.course.category.name}">Cat</span>
						<span th:if="${row.course.category == null}" class="text-muted">—</span>
					</td>
					<td th:text="${#temporals.format(row.enrollDate, 'yyyy-MM-dd HH:mm')}">2025-01-01</td>
				</tr>
				</tbody>
			</table>
		</div>
	</main>
</div>
</body>
</html>
