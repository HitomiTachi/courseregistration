<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
		th:replace="~{layout/main :: siteLayout ('Sign in', 'none', ~{::content})}">
<body>
<div th:fragment="content">
	<div class="container py-5">
		<div class="row justify-content-center">
			<div class="col-12 col-md-6 col-lg-4">
				<h1 class="h4 mb-4">Sign in</h1>
				<div th:if="${param.error}" class="alert alert-danger" role="alert">Invalid username or password.</div>
				<div th:if="${param.registered}" class="alert alert-success" role="alert">Registration successful. Please sign in.</div>
				<div th:if="${param.logout}" class="alert alert-info" role="alert">You have been signed out.</div>
				<form th:action="@{/login}" method="post" class="card card-body shadow-sm">
					<div class="mb-3">
						<label class="form-label" for="username">Username</label>
						<input class="form-control" id="username" name="username" type="text" autocomplete="username" required/>
					</div>
					<div class="mb-3">
						<label class="form-label" for="password">Password</label>
						<input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required/>
					</div>
					<button class="btn btn-primary w-100" type="submit">Login</button>
				</form>
				<div class="text-center text-muted small my-3">or</div>
				<a class="btn btn-outline-secondary w-100" th:href="@{/oauth2/authorization/google}" role="button">Continue with Google</a>
				<p class="mt-3 text-center small"><a th:href="@{/register}">Create an account</a> · <a th:href="@{/home}">Home</a></p>
			</div>
		</div>
	</div>
</div>
</body>
</html>
