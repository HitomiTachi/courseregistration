<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
		th:replace="~{layout/main :: siteLayout ('Admin — Courses', 'admin', ~{::content})}">
<body>
<div th:fragment="content">
	<main class="container-fluid px-3 py-4">
		<div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-3">
			<h1 class="h3 mb-0">Manage courses</h1>
			<a class="btn btn-primary" th:href="@{/admin/courses/new}">Create course</a>
		</div>
		<div th:if="${successMessage}" class="alert alert-success" role="alert" th:text="${successMessage}">Saved</div>
		<div class="table-responsive shadow-sm rounded border bg-white">
			<table class="table table-striped table-hover align-middle mb-0">
				<thead class="table-light">
				<tr>
					<th scope="col">ID</th>
					<th scope="col">Name</th>
					<th scope="col">Credits</th>
					<th scope="col">Lecturer</th>
					<th scope="col">Category</th>
					<th scope="col" class="text-end">Actions</th>
				</tr>
				</thead>
				<tbody>
				<tr th:if="${coursePage.isEmpty()}">
					<td colspan="6" class="text-center text-muted py-4">No courses yet.</td>
				</tr>
				<tr th:each="course : ${coursePage.content}">
					<td th:text="${course.id}">1</td>
					<td th:text="${course.name}">Name</td>
					<td th:text="${course.credits}">3</td>
					<td th:text="${course.lecturer}">Lecturer</td>
					<td>
						<span th:if="${course.category != null}" th:text="${course.category.name}">Cat</span>
						<span th:if="${course.category == null}" class="text-muted">—</span>
					</td>
					<td class="text-end text-nowrap">
						<a class="btn btn-sm btn-outline-primary" th:href="@{/admin/courses/{id}/edit(id=${course.id})}">Edit</a>
						<form class="d-inline" th:action="@{/admin/courses/{id}/delete(id=${course.id})}" method="post"
							onsubmit="return confirm('Delete this course?');">
							<button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
						</form>
					</td>
				</tr>
				</tbody>
			</table>
		</div>
		<nav th:if="${coursePage.totalPages > 1}" class="mt-3" aria-label="Admin course pagination">
			<ul class="pagination flex-wrap justify-content-center mb-0">
				<li class="page-item" th:classappend="${coursePage.first} ? 'disabled'">
					<a class="page-link" th:href="@{/admin/courses(page=${coursePage.number - 1})}">Previous</a>
				</li>
				<li class="page-item" th:each="p : ${#numbers.sequence(0, coursePage.totalPages - 1)}"
					th:classappend="${p == coursePage.number} ? 'active'">
					<a class="page-link" th:href="@{/admin/courses(page=${p})}" th:text="${p + 1}">1</a>
				</li>
				<li class="page-item" th:classappend="${coursePage.last} ? 'disabled'">
					<a class="page-link" th:href="@{/admin/courses(page=${coursePage.number + 1})}">Next</a>
				</li>
			</ul>
		</nav>
	</main>
</div>
</body>
</html>
