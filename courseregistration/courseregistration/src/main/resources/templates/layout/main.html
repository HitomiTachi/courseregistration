<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
		th:fragment="siteLayout (pageTitle, activeNav, mainBlock)">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title th:text="${pageTitle}">Course Registration</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
	<style>
		body { min-height: 100vh; display: flex; flex-direction: column; background-color: var(--bs-light); }
		#layout-content { flex: 1 0 auto; }
	</style>
</head>
<body>
	<nav th:replace="~{fragments/navbar-public :: publicNavbar (${activeNav}, ${q})}"></nav>
	<div id="layout-content" th:replace="${mainBlock}"></div>
	<footer class="border-top py-3 bg-white text-center text-muted small mt-auto shadow-sm">
		<div class="container">
			<span>Course Registration</span>
		</div>
	</footer>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
