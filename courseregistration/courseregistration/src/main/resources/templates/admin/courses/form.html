<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
		th:replace="~{layout/main :: siteLayout (${courseForm.id == null} ? 'Create course' : 'Edit course', 'admin', ~{::content})}">
<body>
<div th:fragment="content">
	<main class="container py-4">
		<p class="mb-3"><a class="small text-muted" th:href="@{/admin/courses}">← Back to admin list</a></p>
		<h1 class="h3 mb-4" th:text="${courseForm.id == null} ? 'Create course' : 'Edit course'">Create</h1>
		<form th:action="${courseForm.id == null} ? @{/admin/courses} : @{/admin/courses/{id}(id=${courseForm.id})}"
				method="post" th:object="${courseForm}" class="card card-body shadow-sm" style="max-width: 36rem;" novalidate>
			<div class="mb-3">
				<label class="form-label" for="name">Name</label>
				<input class="form-control" id="name" th:field="*{name}" type="text" required/>
				<div class="invalid-feedback d-block" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
			</div>
			<div class="mb-3">
				<label class="form-label" for="image">Image URL</label>
				<input class="form-control" id="image" th:field="*{image}" type="text" placeholder="https://..."/>
				<div class="invalid-feedback d-block" th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></div>
			</div>
			<div class="mb-3">
				<label class="form-label" for="credits">Credits</label>
				<input class="form-control" id="credits" th:field="*{credits}" type="number" min="0" step="1" required/>
				<div class="invalid-feedback d-block" th:if="${#fields.hasErrors('credits')}" th:errors="*{credits}"></div>
			</div>
			<div class="mb-3">
				<label class="form-label" for="lecturer">Lecturer</label>
				<input class="form-control" id="lecturer" th:field="*{lecturer}" type="text" required/>
				<div class="invalid-feedback d-block" th:if="${#fields.hasErrors('lecturer')}" th:errors="*{lecturer}"></div>
			</div>
			<div class="mb-3">
				<label class="form-label" for="categoryId">Category</label>
				<select class="form-select" id="categoryId" th:field="*{categoryId}">
					<option value="">— None —</option>
					<option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Category</option>
				</select>
			</div>
			<div class="d-flex gap-2">
				<button class="btn btn-primary" type="submit" th:text="${courseForm.id == null} ? 'Create' : 'Save'">Save</button>
				<a class="btn btn-outline-secondary" th:href="@{/admin/courses}">Cancel</a>
			</div>
		</form>
	</main>
</div>
</body>
</html>
