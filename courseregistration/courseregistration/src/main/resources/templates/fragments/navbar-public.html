<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="publicNavbar (active, qValue)" class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
	<div class="container">
		<a class="navbar-brand" th:href="@{/home}">Course Registration</a>
		<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navPublic" aria-controls="navPublic" aria-expanded="false" aria-label="Toggle navigation">
			<span class="navbar-toggler-icon"></span>
		</button>
		<div class="collapse navbar-collapse" id="navPublic">
			<form class="d-flex mx-lg-2 my-2 my-lg-0 flex-grow-1" style="max-width: 22rem;" role="search" th:action="@{/courses}" method="get">
				<input type="hidden" name="page" value="0"/>
				<input class="form-control form-control-sm me-1" type="search" name="q" th:value="${qValue}" placeholder="Search by course name" aria-label="Search courses"/>
				<button class="btn btn-outline-light btn-sm text-nowrap" type="submit">Search</button>
			</form>
			<ul class="navbar-nav ms-auto flex-wrap">
				<li class="nav-item">
					<a class="nav-link" th:href="@{/home}" th:classappend="${active == 'home'} ? ' active'">Home</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" th:href="@{/courses}" th:classappend="${active == 'courses'} ? ' active'">Courses</a>
				</li>
				<li class="nav-item" sec:authorize="hasRole('STUDENT')">
					<a class="nav-link" th:href="@{/enroll/my}" th:classappend="${active == 'my'} ? ' active'">My courses</a>
				</li>
				<li class="nav-item" sec:authorize="hasRole('ADMIN')">
					<a class="nav-link" th:href="@{/admin/courses}" th:classappend="${active == 'admin'} ? ' active'">Admin</a>
				</li>
				<li class="nav-item" sec:authorize="!isAuthenticated()">
					<a class="nav-link" th:href="@{/login}">Login</a>
				</li>
				<li class="nav-item" sec:authorize="!isAuthenticated()">
					<a class="nav-link" th:href="@{/register}">Register</a>
				</li>
				<li class="nav-item" sec:authorize="isAuthenticated()">
					<form class="d-inline" th:action="@{/logout}" method="post">
						<button class="btn btn-link nav-link p-0" type="submit">Logout</button>
					</form>
				</li>
			</ul>
		</div>
	</div>
</nav>
</body>
</html>
