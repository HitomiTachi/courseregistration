spring.application.name=courseregistration
server.port=8080

# MySQL (Laragon) — DB: course_registration_db
spring.datasource.url=jdbc:mysql://localhost:3306/course_registration_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Google OAuth2 (https://console.cloud.google.com/apis/credentials — OAuth client Web)
# Redirect URI: http://localhost:8080/login/oauth2/code/google
# Replace placeholders or set env GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET (Spring requires non-empty client id to start)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:replace-with-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:replace-with-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
